name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Build functions
        run: npm --prefix functions run build

      - name: Lint and typecheck
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Verify no API keys in dist
        run: |
          if rg -F 'AIzaSy' dist/; then
            echo "::error::Google API key leaked into dist/"
            exit 1
          fi

      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NOTARIA_MELIPILLA }}' > "$RUNNER_TEMP/sa.json"

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          npx -y firebase-tools@latest deploy \
            --only hosting,functions \
            --project notaria-melipilla \
            --non-interactive
