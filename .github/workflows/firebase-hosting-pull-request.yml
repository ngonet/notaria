name: Build and preview on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Build functions
        run: npm --prefix functions run build

      - name: Lint and typecheck
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Verify no API keys in dist
        run: |
          if rg -F 'AIzaSy' dist/; then
            echo "::error::Google API key leaked into dist/"
            exit 1
          fi

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NOTARIA_MELIPILLA }}
          projectId: notaria-melipilla
